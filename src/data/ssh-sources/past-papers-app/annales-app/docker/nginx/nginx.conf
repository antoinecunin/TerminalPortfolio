worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  access_log /dev/stdout;

  # DNS du réseau Docker (re-résolution des noms de containers)
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Taille max des uploads (PDF)
  client_max_body_size 50m;

  # IP réelle côté proxy
  map $http_x_forwarded_for $client_real_ip { default $remote_addr; }

  # Dev: tout autoriser (pas de doublon bruyant)
  geo $allow_ip { default 1; }

  # Rate limiting zones
  # Zone globale API: 5 req/sec par IP (burst permet pics légitimes)
  limit_req_zone $binary_remote_addr zone=api_global:10m rate=5r/s;
  # Zone auth: 20 req/min par IP (protection brute force)
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=20r/m;
  # Zone upload: 10 req/min par IP
  limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;

  # Status code pour rate limit (429 Too Many Requests)
  limit_req_status 429;

  # Upstreams avec mémoire partagée + re-résolution
  upstream web {
    zone web 64k;
    server annales-web:80 resolve;
  }
  upstream api {
    zone api 64k;
    server annales-api:3000 resolve;
  }

  server {
    listen 80;
    server_name _;

    if ($allow_ip = 0) { return 403; }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth endpoints - rate limit (brute force protection)
    location /api/auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Upload endpoint - rate limit
    location /api/files/upload {
      limit_req zone=api_upload burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Autres endpoints API - rate limit global
    location /api/ {
      limit_req zone=api_global burst=50 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
