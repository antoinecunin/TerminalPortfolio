worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  access_log /dev/stdout;

  # DNS du réseau Docker (re-résolution des noms de containers)
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Taille max des uploads (PDF)
  client_max_body_size 50m;

  # IP réelle côté proxy
  map $http_x_forwarded_for $client_real_ip { default $remote_addr; }

  # Dev: tout autoriser (pas de doublon bruyant)
  geo $allow_ip { default 1; }

  # Rate limiting zones (mêmes limites qu'en prod pour tester)
  limit_req_zone $binary_remote_addr zone=api_global:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=20r/m;
  limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;
  limit_req_status 429;

  # Upstreams avec mémoire partagée + re-résolution pour dev
  upstream web {
    zone web 64k;
    server annales-web-dev:5173 resolve;  # Port Vite dev server
  }
  upstream api {
    zone api 64k;
    server annales-api-dev:3001 resolve;  # Port API dev
  }

  server {
    listen 80;
    server_name _;

    if ($allow_ip = 0) { return 403; }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      # Headers pour Vite HMR (Hot Module Replacement)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_http_version 1.1;
    }

    # Auth endpoints - rate limit (brute force protection)
    location /api/auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Upload endpoint - rate limit
    location /api/files/upload {
      limit_req zone=api_upload burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Autres endpoints API - rate limit global
    location /api/ {
      limit_req zone=api_global burst=50 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_real_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}