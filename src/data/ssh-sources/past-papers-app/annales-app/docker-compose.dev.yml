networks:
  public-dev:
  backend-dev:

volumes:
  mongo_data_dev:
  garage_meta_dev:
  garage_data_dev:

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: annales-nginx-dev
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"  # Port différent pour éviter les conflits
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public-dev
      - backend-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile.dev
    container_name: annales-web-dev
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - public-dev
    restart: unless-stopped
    ports:
      - "${VITE_PORT}:${VITE_PORT}"  # Expose Vite dev server
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${VITE_PORT}/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile.dev
    container_name: annales-api-dev
    environment:
      - NODE_ENV=development
      - API_PORT=${API_PORT}
      - API_HOST=0.0.0.0
      - API_LOG_LEVEL=${API_LOG_LEVEL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - MONGO_URI=${MONGO_URI}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_USE_SSL=${S3_USE_SSL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - INITIAL_ADMIN_FIRSTNAME=${INITIAL_ADMIN_FIRSTNAME}
      - INITIAL_ADMIN_LASTNAME=${INITIAL_ADMIN_LASTNAME}
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./instance.config.json:/config/instance.config.json:ro
      - ./instance.config.example.json:/config/instance.config.example.json:ro
    networks:
      - backend-dev
    ports:
      - "${API_EXTERNAL_PORT}:${API_PORT}"  # Expose API dev server
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3001}${API_HEALTH_PATH:-/api/health} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7
    container_name: annales-mongo-dev
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - backend-dev
    ports:
      - "${MONGO_EXTERNAL_PORT}:${MONGO_PORT}"  # Port différent pour le dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.adminCommand({ping:1}).ok?0:1)'"]
      interval: 10s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: annales-garage-dev
    volumes:
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_meta_dev:/var/lib/garage/meta
      - garage_data_dev:/var/lib/garage/data
    ports:
      - "${GARAGE_S3_EXTERNAL_PORT:-3900}:3900"
      - "${GARAGE_ADMIN_EXTERNAL_PORT:-3903}:3903"
    networks:
      - backend-dev
    restart: unless-stopped

